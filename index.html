<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>Rock Paper Scissors</h1>
      <p class="subtitle">First to 5 points wins!</p>

      <div class="score-container" aria-live="polite">
        <div class="score-card">
          <p>PLAYER</p>
          <span id="human-score">0</span>
        </div>
        <div class="score-card">
          <p>COMPUTER</p>
          <span id="computer-score">0</span>
        </div>
      </div>

      <div class="game-controls">
        <button type="button" id="rock" class="btn-choice">🪨</button>
        <button type="button" id="paper" class="btn-choice">🧾</button>
        <button type="button" id="scissors" class="btn-choice">✂️</button>
      </div>

      <div id="round-results">
        <p>Select a move to begin!</p>
      </div>

      <button id="reset-btn" class="hidden">Play Again</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
